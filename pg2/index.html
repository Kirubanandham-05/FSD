<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Shopping Cart</title>
</head>
<body>
    <h1>GADGET STORE</h1>
    <div class="product-container">
        <div class="product">
        <span>Wireless mouse $29</span>
        <button onclick="addtocart('Wireless mouse',29)">add to cart</button>
        </div>
        <div class="product">
        <span>keyboard $42</span>
        <button onclick="addtocart('keyboard',42)">add to cart</button>
        </div>
    </div>
   <div class="cart-container">
     <h2>your cart</h2>
     <ul id="cart-items"></ul>
     <p><strong>total:$ <span id="total-price">0</span></strong></p>
     <button onclick="clearcart()">empty cart</button>
   </div>
   <script src="script.js"></script>
</body>
</html>
