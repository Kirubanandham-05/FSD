<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <style>
        body{
            font-family: Arial, Helvetica, sans-serif;
        }
    </style>
</head>
<body>
    <div class="login-box">
        <h3>Login</h3>
        <form onsubmit="return valLogin()">
            <input type="text" id="u_n" placeholder="usdername">
            <input type="password" id="pw">
            <button type="submit">Login</button>
        </form>
    </div>
    <script>
        function valLogin()
        {
            var username = document.getElementById("u_n").value;
            var password = document.getElementById("pw").value;
            var v_u_n = "admin";
            var v_pw = "12345";
            if(username === "" || password === ""){
                alert("please ufll all the fields")
                return false;
            }
            if(username === v_u_n && password === v_pw){
                alert("succesfully");
                return true;
            }
            else{
                alert("invalid username or password");
            }
        }
    </script>
</body>
</html>
